<title id="title">Cycle duration comparison</title>
<desc id="desc">Line chart comparing cycle duration by movement step for experiment runs. The y-axis reserves 82 percent of plot height for 0 through 200 ms, then compresses higher durations into a log-base-100 tail. High-duration outliers are labeled with their actual duration.</desc>
