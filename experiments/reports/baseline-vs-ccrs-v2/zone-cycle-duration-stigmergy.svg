<text x="72" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="700">Cycle duration comparison</text>
<text x="72" y="50" font-family="Arial, sans-serif" font-size="12" fill="#555">Y-axis compresses values above 200 ms. Max observed: 144 ms.</text>
